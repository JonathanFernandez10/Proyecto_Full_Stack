<div class="fixed inset-0 z-40 flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-black/40" (click)="cerrar.emit()"></div>

    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 sticky top-0 bg-white">
            <h3 class="text-lg font-semibold text-slate-800">{{ titulo }}</h3>
            <button (click)="cerrar.emit()" class="text-slate-400 hover:text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="px-6 py-4">
            <ng-content></ng-content>
        </div>
    </div>
</div>
