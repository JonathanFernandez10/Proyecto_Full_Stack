<div class="min-h-screen flex bg-brand-50">

    <!-- Overlay móvil -->
    <div
        *ngIf="sidebarAbierto"
        (click)="cerrarSidebar()"
        class="fixed inset-0 bg-brand-950/50 z-20 lg:hidden">
    </div>

    <!-- Sidebar -->
    <aside
        class="fixed lg:static inset-y-0 left-0 z-30 w-64 bg-brand-950 text-brand-200 flex flex-col transform transition-transform duration-200 lg:translate-x-0"
        [class.-translate-x-full]="!sidebarAbierto"
        [class.translate-x-0]="sidebarAbierto"
    >
        <div class="flex items-center px-5 h-16 border-b border-brand-900">
            <app-logo variant="lockup" scheme="onDark" [size]="34" nombre="SmartInventory" sublinea="Bodegas del Istmo"></app-logo>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a
                *ngFor="let item of navItems"
                [routerLink]="item.path"
                routerLinkActive="bg-brand-800 !text-white !border-accent-400"
                (click)="cerrarSidebar()"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg border-l-2 border-transparent text-sm font-medium text-brand-300 hover:bg-brand-900 hover:text-white transition-colors"
            >
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
                </svg>
                {{ item.label }}
            </a>
        </nav>

        <div class="border-t border-brand-900 p-4">
            <div class="flex items-center gap-3 mb-3">
                <div class="w-9 h-9 rounded-full bg-brand-800 flex items-center justify-center text-sm font-semibold text-accent-400">
                    {{ usuario?.nombre?.charAt(0) }}
                </div>
                <div class="min-w-0">
                    <p class="text-sm font-medium text-white truncate">{{ usuario?.nombre }}</p>
                    <p class="text-xs text-brand-300 capitalize">{{ usuario?.rol }}</p>
                </div>
            </div>
            <button
                (click)="logout()"
                class="w-full text-sm text-brand-300 hover:text-white hover:bg-brand-900 rounded-lg px-3 py-2 transition-colors text-left"
            >
                Cerrar sesión
            </button>
        </div>
    </aside>

    <!-- Contenido -->
    <div class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-4 lg:px-6 gap-4">
            <button (click)="toggleSidebar()" class="lg:hidden text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <h2 class="text-lg font-semibold text-brand-900">SmartInventory</h2>
        </header>

        <main class="flex-1 p-4 lg:p-6 overflow-y-auto">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
