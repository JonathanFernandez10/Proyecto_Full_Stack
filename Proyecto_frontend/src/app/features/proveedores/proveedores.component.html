<div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-semibold text-slate-800">Proveedores</h1>
            <p class="text-slate-500 text-sm mt-1">Empresas autorizadas para abastecer la bodega.</p>
        </div>
        <button
            *ngIf="puedeEscribir"
            (click)="abrirNuevo()"
            class="bg-accent-400 hover:bg-accent-500 text-brand-950 text-sm font-semibold rounded-lg px-4 py-2.5 transition-colors"
        >
            + Nuevo proveedor
        </button>
    </div>

    <p *ngIf="error" class="mb-4 text-sm text-red-600 bg-red-50 rounded-lg px-4 py-3">{{ error }}</p>

    <div class="mb-4">
        <input
            type="text"
            [(ngModel)]="busqueda"
            placeholder="Buscar por nombre, correo o teléfono..."
            class="w-full sm:w-80 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
        >
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div *ngIf="cargando" class="px-5 py-8 text-center text-slate-400 text-sm">Cargando...</div>

        <table *ngIf="!cargando" class="w-full text-sm">
            <thead>
                <tr class="text-left text-slate-500 border-b border-slate-100 bg-slate-50">
                    <th class="px-5 py-3 font-medium">Nombre</th>
                    <th class="px-5 py-3 font-medium">Contacto</th>
                    <th class="px-5 py-3 font-medium">Teléfono</th>
                    <th class="px-5 py-3 font-medium">Correo</th>
                    <th class="px-5 py-3 font-medium w-32" *ngIf="puedeEscribir"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let proveedor of proveedoresFiltrados" class="border-b border-slate-50 last:border-0 hover:bg-slate-50">
                    <td class="px-5 py-3 text-slate-800 font-medium">{{ proveedor.nombre }}</td>
                    <td class="px-5 py-3 text-slate-500">{{ proveedor.contacto || '—' }}</td>
                    <td class="px-5 py-3 text-slate-500">{{ proveedor.telefono }}</td>
                    <td class="px-5 py-3 text-slate-500">{{ proveedor.correo }}</td>
                    <td class="px-5 py-3" *ngIf="puedeEscribir">
                        <div class="flex gap-2">
                            <button (click)="abrirEditar(proveedor)" class="text-brand-600 hover:text-brand-800 text-xs font-medium">Editar</button>
                            <button (click)="pedirEliminar(proveedor)" class="text-red-600 hover:text-red-800 text-xs font-medium">Eliminar</button>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="!proveedoresFiltrados.length">
                    <td colspan="5" class="px-5 py-8 text-center text-slate-400 text-sm">No hay proveedores registrados.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<app-modal *ngIf="modalAbierto" [titulo]="editandoId ? 'Editar proveedor' : 'Nuevo proveedor'" (cerrar)="cerrarModal()">
    <form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
            <input type="text" formControlName="nombre" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Contacto</label>
            <input type="text" formControlName="contacto" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Teléfono</label>
                <input type="text" formControlName="telefono" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Correo</label>
                <input type="email" formControlName="correo" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Dirección</label>
            <textarea formControlName="direccion" rows="2" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"></textarea>
        </div>
        <div class="flex justify-end gap-3 pt-2">
            <button type="button" (click)="cerrarModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg">Cancelar</button>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 rounded-lg">Guardar</button>
        </div>
    </form>
</app-modal>

<app-confirm-dialog
    *ngIf="porEliminar"
    [titulo]="'Eliminar proveedor'"
    [mensaje]="'¿Eliminar el proveedor \'' + porEliminar.nombre + '\'? Esta acción no se puede deshacer.'"
    (confirmar)="confirmarEliminar()"
    (cancelar)="porEliminar = null"
></app-confirm-dialog>
