<div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-semibold text-slate-800">Movimientos</h1>
            <p class="text-slate-500 text-sm mt-1">Entradas, salidas, ajustes y devoluciones de inventario.</p>
        </div>
        <button
            (click)="abrirNuevo()"
            class="bg-accent-400 hover:bg-accent-500 text-brand-950 text-sm font-semibold rounded-lg px-4 py-2.5 transition-colors"
        >
            + Nuevo movimiento
        </button>
    </div>

    <p *ngIf="error" class="mb-4 text-sm text-red-600 bg-red-50 rounded-lg px-4 py-3">{{ error }}</p>

    <div class="mb-4">
        <input
            type="text"
            [(ngModel)]="busqueda"
            placeholder="Buscar por producto o código..."
            class="w-full sm:w-80 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
        >
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden overflow-x-auto">
        <div *ngIf="cargando" class="px-5 py-8 text-center text-slate-400 text-sm">Cargando...</div>

        <table *ngIf="!cargando" class="w-full text-sm">
            <thead>
                <tr class="text-left text-slate-500 border-b border-slate-100 bg-slate-50">
                    <th class="px-5 py-3 font-medium">Producto</th>
                    <th class="px-5 py-3 font-medium">Tipo</th>
                    <th class="px-5 py-3 font-medium">Cantidad</th>
                    <th class="px-5 py-3 font-medium">Usuario</th>
                    <th class="px-5 py-3 font-medium">Fecha</th>
                    <th class="px-5 py-3 font-medium w-24"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let m of movimientosFiltrados" class="border-b border-slate-50 last:border-0 hover:bg-slate-50">
                    <td class="px-5 py-3 text-slate-800 font-medium">{{ nombreProducto(m) }}</td>
                    <td class="px-5 py-3">
                        <span
                            class="text-xs font-medium rounded-full px-2.5 py-1"
                            [class.bg-emerald-100]="m.tipoMovimiento === 'entrada' || m.tipoMovimiento === 'devolucion'"
                            [class.text-emerald-700]="m.tipoMovimiento === 'entrada' || m.tipoMovimiento === 'devolucion'"
                            [class.bg-red-100]="m.tipoMovimiento === 'salida'"
                            [class.text-red-700]="m.tipoMovimiento === 'salida'"
                            [class.bg-amber-100]="m.tipoMovimiento === 'ajuste'"
                            [class.text-amber-700]="m.tipoMovimiento === 'ajuste'"
                        >{{ m.tipoMovimiento }}</span>
                    </td>
                    <td class="px-5 py-3 text-slate-500">{{ m.cantidad }}</td>
                    <td class="px-5 py-3 text-slate-500">{{ nombreUsuario(m) }}</td>
                    <td class="px-5 py-3 text-slate-400 text-xs">{{ m.fecha | date:'short' }}</td>
                    <td class="px-5 py-3">
                        <button
                            *ngIf="m.tipoMovimiento !== 'ajuste'"
                            (click)="pedirEliminar(m)"
                            class="text-red-600 hover:text-red-800 text-xs font-medium"
                        >Eliminar</button>
                    </td>
                </tr>
                <tr *ngIf="!movimientosFiltrados.length">
                    <td colspan="6" class="px-5 py-8 text-center text-slate-400 text-sm">No hay movimientos registrados.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<app-modal *ngIf="modalAbierto" [titulo]="'Nuevo movimiento'" (cerrar)="cerrarModal()">
    <form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Producto</label>
            <select formControlName="producto" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                <option value="" disabled>Selecciona</option>
                <option *ngFor="let p of productos" [value]="p._id">{{ p.nombre }} ({{ p.codigo }})</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Tipo de movimiento</label>
            <select formControlName="tipoMovimiento" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                <option *ngFor="let t of tipos" [value]="t">{{ t }}</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
                Cantidad <span class="text-xs text-slate-400">(para "ajuste" es el nuevo valor absoluto)</span>
            </label>
            <input type="number" formControlName="cantidad" min="0" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Notas</label>
            <textarea formControlName="notas" rows="2" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"></textarea>
        </div>
        <p *ngIf="errorModal" class="text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2">{{ errorModal }}</p>
        <div class="flex justify-end gap-3 pt-2">
            <button type="button" (click)="cerrarModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg">Cancelar</button>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 rounded-lg">Registrar</button>
        </div>
    </form>
</app-modal>

<app-confirm-dialog
    *ngIf="porEliminar"
    [titulo]="'Eliminar movimiento'"
    [mensaje]="'Se revertirá su efecto sobre el inventario. ¿Continuar?'"
    (confirmar)="confirmarEliminar()"
    (cancelar)="porEliminar = null"
></app-confirm-dialog>
