<div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-semibold text-slate-800">Usuarios</h1>
            <p class="text-slate-500 text-sm mt-1">Cuentas del sistema y sus roles de acceso.</p>
        </div>
        <button
            (click)="abrirNuevo()"
            class="bg-accent-400 hover:bg-accent-500 text-brand-950 text-sm font-semibold rounded-lg px-4 py-2.5 transition-colors"
        >
            + Nuevo usuario
        </button>
    </div>

    <p *ngIf="error" class="mb-4 text-sm text-red-600 bg-red-50 rounded-lg px-4 py-3">{{ error }}</p>

    <div class="mb-4">
        <input
            type="text"
            [(ngModel)]="busqueda"
            placeholder="Buscar por nombre o correo..."
            class="w-full sm:w-80 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
        >
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden overflow-x-auto">
        <div *ngIf="cargando" class="px-5 py-8 text-center text-slate-400 text-sm">Cargando...</div>

        <table *ngIf="!cargando" class="w-full text-sm">
            <thead>
                <tr class="text-left text-slate-500 border-b border-slate-100 bg-slate-50">
                    <th class="px-5 py-3 font-medium">Nombre</th>
                    <th class="px-5 py-3 font-medium">Correo</th>
                    <th class="px-5 py-3 font-medium">Rol</th>
                    <th class="px-5 py-3 font-medium">Proveedor</th>
                    <th class="px-5 py-3 font-medium">Estado</th>
                    <th class="px-5 py-3 font-medium w-32"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let usuario of usuariosFiltrados" class="border-b border-slate-50 last:border-0 hover:bg-slate-50">
                    <td class="px-5 py-3 text-slate-800 font-medium">{{ usuario.nombre }}</td>
                    <td class="px-5 py-3 text-slate-500">{{ usuario.email }}</td>
                    <td class="px-5 py-3 text-slate-500 capitalize">{{ usuario.rol }}</td>
                    <td class="px-5 py-3 text-slate-500">{{ nombreProveedor(usuario) }}</td>
                    <td class="px-5 py-3">
                        <span
                            class="text-xs font-medium rounded-full px-2.5 py-1"
                            [class.bg-emerald-100]="usuario.estado === 'activo'"
                            [class.text-emerald-700]="usuario.estado === 'activo'"
                            [class.bg-slate-100]="usuario.estado === 'inactivo'"
                            [class.text-slate-600]="usuario.estado === 'inactivo'"
                        >{{ usuario.estado }}</span>
                    </td>
                    <td class="px-5 py-3">
                        <div class="flex gap-2">
                            <button (click)="abrirEditar(usuario)" class="text-brand-600 hover:text-brand-800 text-xs font-medium">Editar</button>
                            <button (click)="pedirEliminar(usuario)" class="text-red-600 hover:text-red-800 text-xs font-medium">Eliminar</button>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="!usuariosFiltrados.length">
                    <td colspan="6" class="px-5 py-8 text-center text-slate-400 text-sm">No hay usuarios registrados.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<app-modal *ngIf="modalAbierto" [titulo]="editandoId ? 'Editar usuario' : 'Nuevo usuario'" (cerrar)="cerrarModal()">
    <form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
            <input type="text" formControlName="nombre" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Correo</label>
            <input type="email" formControlName="email" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
                Contraseña <span class="text-xs text-slate-400" *ngIf="editandoId">(dejar en blanco para no cambiarla)</span>
            </label>
            <input type="password" formControlName="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Rol</label>
                <select formControlName="rol" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
                <select formControlName="estado" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    <option value="activo">activo</option>
                    <option value="inactivo">inactivo</option>
                </select>
            </div>
        </div>
        <div *ngIf="rolSeleccionado === 'proveedor'">
            <label class="block text-sm font-medium text-slate-700 mb-1">Proveedor vinculado</label>
            <select formControlName="proveedor" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                <option value="" disabled>Selecciona</option>
                <option *ngFor="let p of proveedores" [value]="p._id">{{ p.nombre }}</option>
            </select>
        </div>
        <p *ngIf="errorModal" class="text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2">{{ errorModal }}</p>
        <div class="flex justify-end gap-3 pt-2">
            <button type="button" (click)="cerrarModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg">Cancelar</button>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 rounded-lg">Guardar</button>
        </div>
    </form>
</app-modal>

<app-confirm-dialog
    *ngIf="porEliminar"
    [titulo]="'Eliminar usuario'"
    [mensaje]="'¿Eliminar al usuario \'' + porEliminar.nombre + '\'? Esta acción no se puede deshacer.'"
    (confirmar)="confirmarEliminar()"
    (cancelar)="porEliminar = null"
></app-confirm-dialog>
