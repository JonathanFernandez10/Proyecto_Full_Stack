<div class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-600 text-white text-2xl font-bold mb-4">S</div>
            <h1 class="text-2xl font-semibold text-white">SmartInventory</h1>
            <p class="text-slate-400 text-sm mt-1">Plataforma interna de Bodegas del Istmo, S.A.</p>
        </div>

        <form
            class="bg-white rounded-2xl shadow-xl p-8 space-y-4"
            [formGroup]="loginForm"
            (ngSubmit)="onSubmit()">

            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Correo electrónico</label>
                <input
                    id="email"
                    type="email"
                    formControlName="email"
                    placeholder="admin@smartinventory.com"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input
                    id="password"
                    type="password"
                    formControlName="password"
                    placeholder="••••••••"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
                >
            </div>

            <p *ngIf="error" class="text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2">{{ error }}</p>

            <button
                type="submit"
                [disabled]="cargando"
                class="w-full bg-brand-600 hover:bg-brand-700 disabled:opacity-60 text-white font-medium rounded-lg py-2.5 text-sm transition-colors"
            >
                {{ cargando ? 'Ingresando...' : 'Entrar' }}
            </button>
        </form>

        <p class="text-center text-slate-500 text-xs mt-6">Acceso restringido al personal autorizado</p>
        <p class="text-center mt-3">
            <a routerLink="/" class="text-slate-400 hover:text-white text-xs underline underline-offset-2 transition-colors">← Volver al portal de la empresa</a>
        </p>
    </div>
</div>
